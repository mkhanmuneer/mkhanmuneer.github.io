project: 
  type: website
  output-dir: docs

# Freeze execution to ensure reproducibility and prevent unintended code runs during rendering 
execute: 
  freeze: true # Set to true if you want to prevent any code execution during rendering

website:
  title: "Muhammad Khan Muneer"
  site-url: "https://mkhanmuneer.github.io/"
  repo-url: "https://github.com/mkhanmuneer/mkhanmuneer.github.io"
  description: "Consulting‑grade Data Science, BI Engineering, and Operational Intelligence Portfolio."
  
  # --- SEO & Social Metadata (Corrected) ---
  open-graph:
    title: "Muhammad Khan Muneer — Data Science & BI Portfolio"
    description: "Engineering ML-driven analytics and automated decision systems."
    # For Facebook, Quarto handles this via generic Open Graph
    # You can also add a site name here
    site-name: "M. Khan Muneer Portfolio"

  twitter-card:
    site: "@iMKhanMuneer"
    creator: "@iMKhanMuneer"
    card-style: summary_large_image

  # --- Search UX ---
  search: 
    location: navbar
    type: overlay
    copy-button: true

  # --- Navigation ---
  navbar:
    title: false # Hides the title from the navbar, since we have it in the hero banner
    left:
      - href: index.qmd
        text: Home
      - href: index.qmd#featured-projects
        text: Projects
      - href: cv.qmd
        text: CV
    right:
      - icon: linkedin
        href: https://www.linkedin.com/in/mkmuneer
      - icon: github
        href: https://github.com/mkhanmuneer
      - icon: twitter-x
        href: https://x.com/iMKhanMuneer
      - icon: graph-up
        href: https://www.kaggle.com/muhammadkhanmuneer
      - text: "Contact"
        href: "#contact"
  
  
  # --- Footer ---
  page-footer:
    left: "© 2026 Muhammad Khan Muneer"
    center: 
      - text: "Hire on Upwork"
        href: "https://www.upwork.com/freelancers/~018de8553286a1d00c"
      - text: "Hire on Fiverr"
        href: "https://www.fiverr.com/rimot_solutionz"
    right: 
      - icon: github
        href: https://github.com/mkhanmuneer
      - icon: linkedin
        href: https://www.linkedin.com/in/mkmuneer

format:
  html:
    theme:
      light: cosmo
      dark: cyborg
    toc: true
    toc-depth: 3
    code-fold: true
    smooth-scroll: true
    css: styles/custom.css
    mainfont: "Inter, sans-serif" # Cleaner, more modern than standard Cosmo
    page-layout: article         # Ensures a standard starting point for all pages

