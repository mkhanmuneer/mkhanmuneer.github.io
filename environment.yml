# DataCo Logistics – Full-Stack Data Science Environment
# Create this environment using conda command: `conda env create -f environment.yml`
# Update this environment using: `conda env update --file environment.yml --prune`
name: dataco_env
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Quarto Execution & Caching
  - jupyter-cache

  # Core data stack
  - pandas=2.2.2
  - numpy=1.26.4
  - scipy=1.12.0
  - pyarrow=15.0.2
  - fastparquet=2024.2.0
  - openpyxl=3.1.2
  - python-dateutil
  - tqdm
  - joblib

  # Machine learning
  - scikit-learn=1.4.1
  - xgboost=2.0.3
  - lightgbm=4.3.0
  - catboost=1.2.3
  - imbalanced-learn=0.12.0
  - shap=0.44.1

  # Clustering & statistics
  - hdbscan=0.8.33
  - statsmodels=0.14.1
  - umap-learn=0.5.5

  # Geospatial stack
  - geopandas=0.14.3
  - shapely=2.0.3
  - pyproj=3.6.1
  - rtree=1.2.0

  # Visualisation
  - matplotlib=3.8.3
  - seaborn=0.13.2
  - plotly=5.19.0
  - squarify

  # Notebook + VS Code integration
  - jupyterlab
  - ipykernel
  - nbformat
  - black
  - flake8
  - notebook

  # Optional extras
  - rich
  - pydantic
  - python-dotenv
  - requests

  # Behavioural-data enrichment (pip-only)
  - pip:
      - haversine==2.8.0
      - clean-text==0.6.0
      - rapidfuzz==3.6.1
      - urlextract==1.9.0
      - python-slugify==8.0.4
      - ip2geotools==0.1.6
      - category_encoders==2.6.3
      - asttokens

  # Test dependencies
  - pytest
  - pytest-cov
  - pytest-mock